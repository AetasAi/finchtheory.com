name: Update insights index on article push

on:
  push:
    paths:
      - 'insights/*.html'

permissions:
  contents: write

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild insights index
        run: python scripts/build-insights-index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No index changes."
          else
            git commit -m "Auto: rebuild insights index after article push"
            git push
          fi
